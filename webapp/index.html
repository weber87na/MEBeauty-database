<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>外貿協會 AI 相機</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text x=%2250%%22 y=%2250%%22 font-size=%2280%22 text-anchor=%22middle%22 dominant-baseline=%22central%22>😄</text></svg>">
  <link rel="stylesheet" href="/assets/styles.css">
</head>
<body>
  <main class="app">
    <section class="controls">
      <header>
        <h1>外貿協會 AI 相機</h1>
        <p>上傳 JPG、PNG、WEBP 或 BMP，使用 AI 模型估計分數。</p>
      </header>

      <div class="status">
        <span>Device</span>
        <strong id="device">Loading</strong>
      </div>

      <form id="predictForm">
        <label class="field">
          <span>模型</span>
          <select id="modelSelect" name="model_path" required></select>
        </label>

        <label class="field">
          <span>模糊門檻值</span>
          <select id="thresholdSelect" name="threshold">
            <option value="8.0">8.0</option>
            <option value="8.5" selected>8.5</option>
            <option value="9.0">9.0</option>
            <option value="9.5">9.5</option>
          </select>
        </label>

        <div class="inputGroup">
          <label class="dropzone" id="dropzone">
            <input id="imageInput" name="image" type="file" accept="image/png,image/jpeg,image/webp,image/bmp">
            <span>選擇圖片</span>
          </label>
          <div class="buttonGrid">
            <button id="cameraButton" type="button" class="secondary">開啟相機</button>
            <button id="captureButton" type="button" class="secondary" disabled>拍照</button>
          </div>
        </div>

        <div class="cameraBox">
          <video id="cameraVideo" autoplay playsinline></video>
          <canvas id="cameraCanvas"></canvas>
        </div>

        <div class="actionBar">
          <button id="clearButton" type="button" class="secondary">清除</button>
          <button id="downloadButton" type="button" class="secondary" disabled>下載結果</button>
        </div>
        <button id="shareButton" type="button" disabled>複製分享文字</button>
      </form>

      <p class="message" id="message"></p>
      <div class="leaderboardPanel">
        <div class="leaderboardStats">
          <div>
            <span>最高顏值</span>
            <strong id="bestBeauty">--</strong>
          </div>
          <div>
            <span>最兇指數</span>
            <strong id="bestThreat">--</strong>
          </div>
        </div>
        <div class="sessionHistory" id="sessionHistory">尚無紀錄</div>
      </div>
    </section>

    <section class="preview">
      <div class="imageStage">
        <img id="previewImage" alt="Uploaded preview">
        <div id="imageOverlay" class="imageOverlay" aria-hidden="true"></div>
        <div id="emptyState">尚未選擇圖片</div>
      </div>
      <div class="scorePanel">
        <div>
          <span>Beauty score</span>
          <p class="relative" id="relativeRank">相對等級 --</p>
        </div>
        <strong id="score">--</strong>
      </div>
      <div class="behaviorPanel">
        <div>
          <span>輸出模式</span>
          <strong id="behaviorMode">尚未判定</strong>
        </div>
        <p id="behaviorReasons">拍照或選擇圖片後顯示觸發原因。</p>
      </div>
      <div class="detailsPanel" id="cropDetails" aria-live="polite">
        <div class="detailsHeader">
          <div class="detailsTitle">Crop details</div>
          <button type="button" id="toggleDetailsButton" class="toggleButton" aria-expanded="false">▼</button>
        </div>
        <div class="detailsContent" id="detailsContent" style="display: none;">
          <div class="detailsEmpty">尚未產生詳細分數</div>
        </div>
      </div>
    </section>
  </main>

  <script src="/assets/app.js"></script>
</body>
</html>
