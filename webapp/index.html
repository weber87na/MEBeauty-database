<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>高顏值照相機</title>
  <link rel="stylesheet" href="/assets/styles.css">
</head>
<body>
  <main class="app">
    <section class="controls">
      <header>
        <h1>高顏值照相機</h1>
        <p>上傳 JPG、PNG、WEBP 或 BMP，使用本機 PyTorch 模型估計分數。</p>
      </header>

      <div class="status">
        <span>Device</span>
        <strong id="device">Loading</strong>
      </div>

      <form id="predictForm">
        <label class="field">
          <span>模型</span>
          <select id="modelSelect" name="model_path" required></select>
        </label>

        <div class="inputGroup">
          <label class="dropzone" id="dropzone">
            <input id="imageInput" name="image" type="file" accept="image/png,image/jpeg,image/webp,image/bmp">
            <span>選擇圖片</span>
          </label>
          <div class="buttonGrid">
            <button id="cameraButton" type="button" class="secondary">開啟相機</button>
            <button id="captureButton" type="button" class="secondary" disabled>拍照</button>
          </div>
        </div>

        <div class="cameraBox">
          <video id="cameraVideo" autoplay playsinline></video>
          <canvas id="cameraCanvas"></canvas>
        </div>

        <div class="actionBar">
          <button id="clearButton" type="button" class="secondary">清除</button>
        </div>
      </form>

      <p class="message" id="message"></p>
    </section>

    <section class="preview">
      <div class="imageStage">
        <img id="previewImage" alt="Uploaded preview">
        <div id="emptyState">尚未選擇圖片</div>
      </div>
      <div class="scorePanel">
        <div>
          <span>Beauty score</span>
          <p class="relative" id="relativeRank">相對等級 --</p>
        </div>
        <strong id="score">--</strong>
      </div>
      <div class="detailsPanel" id="cropDetails" aria-live="polite">
        <div class="detailsTitle">Crop details</div>
        <div class="detailsEmpty">尚未產生詳細分數</div>
      </div>
    </section>
  </main>

  <script src="/assets/app.js"></script>
</body>
</html>
